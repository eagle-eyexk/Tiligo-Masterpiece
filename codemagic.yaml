workflows:
  ios-release:
    name: iOS Release - Tiligo-Masterpiece
    instance_type: mac_mini_m1
    max_build_duration: 120

    environment:
      node: 20
      xcode: latest
      cocoapods: default

      groups:
        - code-signing

      vars:
        BUNDLE_ID: "com.tiligo.tilgo"
        TEAM_ID: "H4QUDPK7S3"
        ISSUER_ID: "6d7acece-2356-43c3-9946-6fd2cda5bf7d"
        KEY_ID: "3FM3UY4ARQ"
        PROFILE_NAME: "TiliGo Cer"

    cache:
      cache_paths:
        - node_modules
        - ios/Pods
        - ~/.cocoapods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:

      # -------------------------
      # 1. Dependency installation
      # -------------------------
      - name: Install dependencies (deterministic)
        script: |
          corepack enable
          yarn install --frozen-lockfile

      # -------------------------
      # 2. Build web layer
      # -------------------------
      - name: Build web app
        script: |
          yarn build

      # -------------------------
      # 3. Capacitor sync
      # -------------------------
      - name: Sync Capacitor
        script: |
          npx cap sync ios
          cd ios/App && pod install --repo-update

      # -------------------------
      # 4. Secure keychain setup
      # -------------------------
      - name: Setup secure keychain
        script: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      # -------------------------
      # 5. Import signing assets safely
      # -------------------------
      - name: Import signing assets
        script: |
          set -e

          for file in signing/*.p12; do
            [ -f "$file" ] || continue
            security import "$file" \
              -k build.keychain \
              -P "$P12_PASSWORD" \
              -T /usr/bin/codesign
          done

          for file in signing/*.mobileprovision; do
            [ -f "$file" ] || continue
            UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
              $(security cms -D -i "$file") 2>/dev/null)

            cp "$file" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          done

      # -------------------------
      # 6. Validate signing setup
      # -------------------------
      - name: Validate signing identity
        script: |
          security find-identity -v -p codesigning

      # -------------------------
      # 7. Build versioning
      # -------------------------
      - name: Set build version
        script: |
          cd ios/App
          BUILD_NUMBER=$((GITHUB_RUN_NUMBER + 1000))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" App/Info.plist || true

      # -------------------------
      # 8. Archive build
      # -------------------------
      - name: Archive iOS app
        script: |
          cd ios/App

          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGN_STYLE=Manual \
            clean archive

      # -------------------------
      # 9. Export IPA (safe mode)
      # -------------------------
      - name: Export IPA
        script: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build

    artifacts:
      - build/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        issuer_id: $ISSUER_ID
        key_id: $KEY_ID
        submit_to_testflight: true

      email:
        recipients:
          - elgrandexx@icloud.com
        notify:
          success: true
          failure: true