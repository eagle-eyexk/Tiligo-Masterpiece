workflows:
  ios-release:
    name: iOS Release - Tiligo-Masterpiece
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      groups:
        - code-signing
      vars:
        BUNDLE_ID: "com.tiligo.tilgo"
        TEAM_ID: "H4QUDPK7S3"
        ISSUER_ID: "6d7acece-2356-43c3-9946-6fd2cda5bf7d"
        KEY_ID: "3FM3UY4ARQ"
        PROFILE_NAME: "TiliGo Cer"
        KEYCHAIN_PASSWORD: "build123"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: 📦 Install dependencies and Capacitor
        script: |
          echo "📦 Installing essential dependencies..."
          npm install --no-package-lock --omit=dev || echo "npm install failed, continuing..."
          
          echo "⚡ Installing Capacitor core and iOS..."
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/ios
      
      - name: 📁 Create minimal web build
        script: |
          echo "📁 Creating minimal web build in dist/ folder..."
          mkdir -p dist
          
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Tiligo</title>
            </head>
            <body>
              <div id="root"></div>
              <script>
                document.getElementById('root').innerHTML = 
                  '<h1>Tiligo</h1><p>Loading...</p>';
              </script>
            </body>
          </html>
          EOF
          
          echo "✅ index.html created in dist/"
      
      - name: 📝 Create Capacitor config
        script: |
          echo "⚙️ Creating capacitor.config.json..."
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.tiligo.tilgo",
            "appName": "Tiligo",
            "webDir": "dist",
            "bundledWebRuntime": false
          }
          EOF
      
      - name: 🔧 Create iOS folder with correct Podfile
        script: |
          echo "🔧 Creating iOS folder with correct deployment target..."
          
          # Remove existing ios folder if it exists
          if [ -d "ios" ]; then
            echo "⚠️ Removing existing ios folder..."
            rm -rf ios
          fi
          
          # Create ios folder structure
          mkdir -p ios/App
          
          # Create Podfile with correct deployment target and project path
          cat > ios/App/Podfile << 'EOF'
          platform :ios, '14.0'
          install! 'cocoapods', :deterministic_uuids => false
          
          project 'App.xcodeproj'
          
          target 'App' do
            capacitor_pods = true
            # Add your Pods here
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          echo "✅ Podfile created with iOS 14.0 deployment target"
      
      - name: 🔄 Manually add iOS platform
        script: |
          echo "📱 Manually adding Capacitor iOS platform..."
          
          # Run cap add with no sync to avoid automatic pod install
          npx cap add ios --no-sync || echo "iOS add completed with warnings"
          
          # Fix the project deployment target
          cd ios/App
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' App.xcodeproj/project.pbxproj 2>/dev/null || \
          sed -i 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' App.xcodeproj/project.pbxproj 2>/dev/null || true
          
          # Ensure the project file exists
          ls -la App.xcodeproj/ || echo "Project file check"
          
          cd ../..
          
          echo "✅ iOS platform added with fixed deployment target"
      
      - name: 🔄 Sync Capacitor
        script: |
          echo "🔄 Syncing Capacitor (without pod install)..."
          npx cap sync ios --no-build
      
      - name: 📦 Install CocoaPods dependencies
        script: |
          echo "📦 Installing CocoaPods dependencies..."
          cd ios/App
          
          # Verify Podfile exists
          cat Podfile
          
          # Run pod install
          pod install --repo-update
          
          cd ../..
      
      - name: 🔐 Install certificate from signing folder
        script: |
          echo "🔐 Installing certificates from signing/ folder..."
          
          security create-keychain -p $KEYCHAIN_PASSWORD build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p $KEYCHAIN_PASSWORD build.keychain
          
          for p12 in signing/*.p12; do
            if [ -f "$p12" ]; then
              echo "📂 Importing: $p12"
              security import "$p12" -k build.keychain -P "" -T /usr/bin/codesign
            fi
          done
          
          for pem in signing/*.pem; do
            if [ -f "$pem" ]; then
              echo "📂 Importing: $pem"
              security import "$pem" -k build.keychain -T /usr/bin/codesign
            fi
          done
          
          security set-key-partition-list -S apple-tool:,apple: -s -k $KEYCHAIN_PASSWORD build.keychain
          
          echo "✅ Certificates installed successfully"
          security find-identity -v -p apple
      
      - name: 📋 Install provisioning profile
        script: |
          echo "📋 Installing provisioning profiles from signing/ folder..."
          
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          
          for profile in signing/*.mobileprovision; do
            if [ -f "$profile" ]; then
              echo "📂 Installing: $profile"
              cp "$profile" ~/Library/MobileDevice/Provisioning\ Profiles/
            fi
          done
          
          echo "✅ Profiles installed:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
      
      - name: 🔍 Debug - List installed profiles
        script: |
          echo "📋 Installed provisioning profiles:"
          for profile in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            if [ -f "$profile" ]; then
              echo "📂 $profile"
              /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< $(cat "$profile" 2>/dev/null | openssl smime -inform der -verify -noverify 2>/dev/null) 2>/dev/null || echo "  Could not read name"
            fi
          done
      
      - name: 🚀 Build and export IPA
        script: |
          cd ios/App
          
          BUILD=$(( $(date +%s) - 1700000000 ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" App/Info.plist 2>/dev/null || true
          
          security default-keychain -s build.keychain
          security unlock-keychain -p $KEYCHAIN_PASSWORD build.keychain
          
          PROFILE_NAME=$(find ~/Library/MobileDevice/Provisioning\ Profiles/ -name "*.mobileprovision" -exec /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< $(cat {} 2>/dev/null | openssl smime -inform der -verify -noverify 2>/dev/null) \; 2>/dev/null | head -1)
          
          if [ -z "$PROFILE_NAME" ]; then
            echo "⚠️ No profile found, using default: TiliGo Cer"
            PROFILE_NAME="TiliGo Cer"
          fi
          
          echo "🔐 Using provisioning profile: $PROFILE_NAME"
          
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -archivePath /Users/builder/build/App.xcarchive \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            -allowProvisioningUpdates \
            archive
          
          test -d /Users/builder/build/App.xcarchive || exit 1
          
          cat > /Users/builder/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$BUNDLE_ID</key>
                  <string>$PROFILE_NAME</string>
              </dict>
          </dict>
          </plist>
          PLIST
          
          xcodebuild -exportArchive \
            -archivePath /Users/builder/build/App.xcarchive \
            -exportPath /Users/builder/build \
            -exportOptionsPlist /Users/builder/ExportOptions.plist
    artifacts:
      - /Users/builder/build/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        issuer_id: $ISSUER_ID
        key_id: $KEY_ID
        submit_to_testflight: true
      email:
        recipients:
          - elgrandexx@icloud.com
        notify:
          success: true
          failure: true